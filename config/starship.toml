format = """
[╭─](bold green)$directory$git_branch$git_status$git_metrics
[╰─](bold green)$character"""

right_format = """$time"""

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
format = "[ $path]($style)"

[git_branch]
symbol = " "
style = "bold purple"
format = "[ $symbol$branch]($style)"

[git_status]
style = "bold yellow"
format = '([ $all_status$ahead_behind]($style))'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
deleted = "✘${count}"
renamed = "»${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([ +$added]($added_style))([ -$deleted]($deleted_style))'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bold blue"
format = '[ $time]($style)'

[cmd_duration]
min_time = 500
format = "[ took $duration](bold yellow)"

[nodejs]
symbol = " "
format = "[ $symbol($version)]($style)"

[python]
symbol = " "
format = "[ $symbol($version)]($style)"

[rust]
symbol = " "
format = "[ $symbol($version)]($style)"

[golang]
symbol = " "
format = "[ $symbol($version)]($style)"

[docker_context]
symbol = " "
format = "[ $symbol$context]($style)"
